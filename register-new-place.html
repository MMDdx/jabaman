<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درج اقامتگاه جدید | پلتفرم اجاره اقامتگاه</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<body>

<div class="add-listing-container">

    <div class="page-header">
        <h1>درج اقامتگاه جدید</h1>
        <p>مشخصات کامل اقامتگاه را وارد کنید تا مهمانان بتوانند آن را پیدا کنند.</p>
    </div>

    <div class="form-card">
        <div class="form-header">
            <i class="fas fa-home"></i>
            <h2>فرم افزودن اقامتگاه</h2>
        </div>

        <form class="listing-form" action="#" method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label for="property-title">عنوان اقامتگاه <span class="required-star">*</span></label>
                <input type="text" id="property-title" name="property_title" class="form-control"
                       placeholder="مثلاً: ویلای ساحلی رویایی" required>
            </div>

            <div class="form-group">
                <label for="description">توضیحات <span class="required-star">*</span></label>
                <textarea id="description" name="description" class="form-control" rows="5"
                          placeholder="امکانات، ویژگی‌ها و هر آنچه مهمان باید بداند..." required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="property-type">نوع اقامتگاه <span class="required-star">*</span></label>
                    <select id="property-type" name="property_type" class="form-control" required>
                        <option value="" disabled selected>انتخاب کنید</option>
                        <option value="villa">ویلا</option>
                        <option value="apartment">آپارتمان</option>
                        <option value="cottage">کلبه</option>
                        <option value="villa-garden">باغ ویلا</option>
                        <option value="penthouse">پنت‌هاوس</option>
                        <option value="other">سایر</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="location">موقعیت / آدرس <span class="required-star">*</span></label>
                    <input type="text" id="location" name="location" class="form-control"
                           placeholder="شهر، منطقه، خیابان" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="price">قیمت هر شب (تومان) <span class="required-star">*</span></label>
                    <input type="number" id="price" name="price_per_night" class="form-control"
                           placeholder="مثلاً ۵۰۰,۰۰۰" required min="0" step="1000">
                </div>
                <div class="form-group">
                    <label for="max-guests">حداکثر تعداد مهمان <span class="required-star">*</span></label>
                    <input type="number" id="max-guests" name="max_guests" class="form-control"
                           placeholder="مثلاً ۴" required min="1" max="50">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bedrooms">تعداد اتاق خواب</label>
                    <input type="number" id="bedrooms" name="bedrooms" class="form-control"
                           placeholder="مثلاً ۲" min="0" max="20" value="0">
                </div>
                <div class="form-group">
                    <label for="bathrooms">تعداد سرویس بهداشتی</label>
                    <input type="number" id="bathrooms" name="bathrooms" class="form-control"
                           placeholder="مثلاً ۱" min="0" max="20" value="0">
                </div>
            </div>

            <div class="form-group">
                <label>امکانات</label>
                <div class="amenities-grid">
                    <div class="amenity-item">
                        <input type="checkbox" id="amenity-wifi" name="amenities[]" value="wifi">
                        <label for="amenity-wifi">وای‌فای</label>
                    </div>
                    <div class="amenity-item">
                        <input type="checkbox" id="amenity-parking" name="amenities[]" value="parking">
                        <label for="amenity-parking">پارکینگ</label>
                    </div>
                    <div class="amenity-item">
                        <input type="checkbox" id="amenity-pool" name="amenities[]" value="pool">
                        <label for="amenity-pool">استخر</label>
                    </div>
                    <div class="amenity-item">
                        <input type="checkbox" id="amenity-kitchen" name="amenities[]" value="kitchen">
                        <label for="amenity-kitchen">آشپزخانه</label>
                    </div>
                    <div class="amenity-item">
                        <input type="checkbox" id="amenity-ac" name="amenities[]" value="air_conditioning">
                        <label for="amenity-ac">کولر/گرمایش</label>
                    </div>
                    <div class="amenity-item">
                        <input type="checkbox" id="amenity-tv" name="amenities[]" value="tv">
                        <label for="amenity-tv">تلویزیون</label>
                    </div>
                    <div class="amenity-item">
                        <input type="checkbox" id="amenity-washer" name="amenities[]" value="washer">
                        <label for="amenity-washer">ماشین لباسشویی</label>
                    </div>
                    <div class="amenity-item">
                        <input type="checkbox" id="amenity-pet" name="amenities[]" value="pet_friendly">
                        <label for="amenity-pet">مناسب حیوانات</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>تصویر اصلی اقامتگاه <span class="required-star">*</span></label>
                <div class="file-input-wrapper">
                    <input type="file" id="main-image" name="main_image" accept="image/*" required>
                    <label for="main-image" class="file-label">
                        <i class="fas fa-cloud-upload-alt"></i> انتخاب تصویر اصلی
                    </label>
                    <span style="color:#6c7a8a; font-size:0.9rem;">حداقل یک تصویر الزامی است</span>
                </div>
            </div>

            <div class="form-group">
                <label>تصاویر بیشتر</label>
                <div class="file-input-wrapper">
                    <input type="file" id="gallery-images" name="gallery_images[]" accept="image/*" multiple>
                    <label for="gallery-images" class="file-label">
                        <i class="fas fa-images"></i> بارگذاری چند تصویر
                    </label>
                    <span style="color:#6c7a8a; font-size:0.9rem;">می‌توانید چند فایل انتخاب کنید</span>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                درج اقامتگاه <i class="fas fa-chevron-left"></i>
            </button>

        </form>
    </div>

    <div class="site-footer">
        © ۲۰۲۵ پلتفرم اجاره اقامتگاه — تمام حقوق محفوظ است.
    </div>
</div>

</body>
</html>
